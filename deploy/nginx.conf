# Nginx config for APC Karma
# After editing: nginx -t && systemctl reload nginx
#
# Usage: copy to /etc/nginx/sites-available/apckarma
#        then: ln -sf /etc/nginx/sites-available/apckarma /etc/nginx/sites-enabled/apckarma
#
# NOTE: The ssl_* lines are added automatically by certbot.
#       Run: certbot --nginx -d apckarma.1petaflop.tech

# Required for WebSocket upgrade header - define at http level via nginx.conf include or here
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name apckarma.1petaflop.tech;

    # -- Static assets served directly by Nginx (fast, no Node overhead) --
    location /_next/static/ {
        alias /var/www/apckarma/.next/static/;
        expires 365d;
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
        root /var/www/apckarma/public;
        expires 365d;
        access_log off;
        try_files $uri =404;
    }

    # -- All other requests proxied to Next.js standalone server --
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSL certs managed by certbot - will be filled in automatically
    ssl_certificate /etc/letsencrypt/live/apckarma.1petaflop.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apckarma.1petaflop.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name apckarma.1petaflop.tech;
    return 301 https://$host$request_uri;
}
