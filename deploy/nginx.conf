# Nginx config for APC Karma
# Deploy steps:
#   cp deploy/nginx.conf /etc/nginx/sites-available/apckarma
#   ln -sf /etc/nginx/sites-available/apckarma /etc/nginx/sites-enabled/apckarma
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d apckarma.1petaflop.tech   ← certbot adds SSL lines automatically
#   systemctl enable --now certbot.timer

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTPS server (certbot will fill-in the ssl_* lines below automatically)
server {
    listen 80;
    listen [::]:80;
    server_name apckarma.1petaflop.tech;

    location /_next/static/ {
        alias /var/www/apckarma/.next/static/;
        expires 365d;
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
        root /var/www/apckarma/public;
        expires 365d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
